<!DOCTYPE html>
<html>
<head>
<title>Advanced Marketplace</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  display: flex;
}

.sidebar {
  width: 250px;
  background: #1e293b;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar ul li {
  padding: 12px;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}

.sidebar ul li:hover {
  background: #334155;
}

.main {
  flex: 1;
  padding: 20px;
}

.search-box {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}


.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.card h3 {
  margin-bottom: 10px;
}

.card ul {
  padding: 0;
  list-style: none;
}

.card ul li {
  padding: 6px 0;
  color: #555;
  cursor: pointer;
}

.card ul li:hover {
  color: #007bff;
}

.badge {
  background: #007bff;
  color: white;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-left: 8px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Marketplace</h2>
  <ul>
    <li><i class="fa fa-house"></i> Housing</li>
    <li><i class="fa fa-users"></i> Community</li>
    <li><i class="fa fa-briefcase"></i> Jobs</li>
    <li><i class="fa fa-tools"></i> Services</li>
  </ul>
</div>

<div class="main">

  <input class="search-box" placeholder="Search listings...">

  <div class="grid">

    <div class="card">
      <h3>Housing <span class="badge">120</span></h3>
      <ul>
        <li>Apartments</li>
        <li>Rooms</li>
        <li>Sublets</li>
        <li>Office</li>
      </ul>
    </div>

    <div class="card">
      <h3>Community <span class="badge">80</span></h3>
      <ul>
        <li>Events</li>
        <li>Classes</li>
        <li>Volunteers</li>
      </ul>
    </div>

    <div class="card">
      <h3>Jobs <span class="badge">200</span></h3>
      <ul>
        <li>IT Jobs</li>
        <li>Sales</li>
        <li>Marketing</li>
      </ul>
    </div>

  </div>

</div>

</body>
</html>
