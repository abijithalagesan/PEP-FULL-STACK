<!DOCTYPE html>
<html>
<head>
<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

.container {
  width: 60%;
  margin: 20px auto;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-auto-rows: 5vw;
  gap: 10px;
}

.gallery_img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.gallery_item-1 {
  grid-column: 1 / 3;
  grid-row: 1 / 3;
}

.gallery_item-2 {
  grid-column: 3 / 5;
  grid-row: 1 / 3;
}

.gallery_item-3 {
  grid-column: 5 / 9;
  grid-row: 1 / 6;
}

.gallery_item-4 {
  grid-column: 1 / 5;
  grid-row: 3 / 6;
}

.gallery_item-5 {
  grid-column: 1 / 5;
  grid-row: 6 / 8;
}

.gallery_item-6 {
  grid-column: 5 / 9;
  grid-row: 6 / 8;
}

</style>
</head>

            <figure class="gallery_item gallery_item-6">
              <img src="C:\Users\anton\OneDrive\Pictures\car6.jpg" class="gallery_img">
            </figure>
        </div>
        </div>
</html>
