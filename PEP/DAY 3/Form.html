<!DOCTYPE html>
<html>
<head>
<title>Basic Form</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

.form-container {
  width: 300px;
  margin: 80px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}
</style>
</head>

<body>

<div class="form-container">
  <h2>Register</h2>

  <form>
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>

    <select>
      <option>Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <button type="submit">Submit</button>
  </form>
</div>

</body>
</html>
